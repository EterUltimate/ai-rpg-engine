# Docker Compose 开发环境配置
# 用于本地开发，支持热重载和调试

version: '3.8'

services:
  # 前端开发服务器（支持热重载）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ai-rpg-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      # 挂载源代码实现热重载
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/index.html:/app/index.html:cached
      # 排除node_modules
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - ai-rpg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Go API网关
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile.dev
    container_name: ai-rpg-gateway-dev
    ports:
      - "8000:8000"
    volumes:
      # 挂载Go源代码
      - ./backend/gateway:/app:cached
      - go-modules:/go/pkg/mod
    environment:
      - GIN_MODE=debug
      - GAME_ENGINE_URL=http://game-engine:8001
      - AI_ENGINE_URL=http://ai-engine:8002
    depends_on:
      game-engine:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    networks:
      - ai-rpg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # 游戏引擎服务
  game-engine:
    build:
      context: ./backend/services/game-engine
      dockerfile: Dockerfile.dev
    container_name: ai-rpg-game-engine-dev
    ports:
      - "8001:8001"
    volumes:
      # 挂载源代码
      - ./backend/services/game-engine/app:/app/app:cached
      # 数据库持久化
      - ./database:/app/database
      # 虚拟环境（避免重复安装）
      - game-engine-venv:/app/venv
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite+aiosqlite:///app/database/sqlite/game.db
      - LOG_LEVEL=DEBUG
    networks:
      - ai-rpg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # AI推理服务
  ai-engine:
    build:
      context: ./backend/services/ai-engine
      dockerfile: Dockerfile.dev
    container_name: ai-rpg-ai-engine-dev
    ports:
      - "8002:8002"
    volumes:
      # 挂载源代码
      - ./backend/services/ai-engine:/app:cached
      # 模型文件（需要预先下载）
      - ./models:/app/models:ro
      # 数据库持久化
      - ./database:/app/database
      # 虚拟环境
      - ai-engine-venv:/app/venv
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_MODEL_PATH=/app/models/llm/model.gguf
      - CHROMADB_PATH=/app/database/chromadb
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - LOG_LEVEL=DEBUG
      # Lite模式配置（可选）
      - LITE_MODE=false
    networks:
      - ai-rpg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  ai-rpg-network:
    driver: bridge
    name: ai-rpg-network

volumes:
  # Go模块缓存
  go-modules:
    name: ai-rpg-go-modules
  # Python虚拟环境
  game-engine-venv:
    name: ai-rpg-game-engine-venv
  ai-engine-venv:
    name: ai-rpg-ai-engine-venv
